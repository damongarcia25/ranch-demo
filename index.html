<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Cedar Hollow Ranch — the ranch, in your pocket</title>
<meta name="theme-color" content="buckskin" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Cedar Hollow" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%20%22Cedar%20Hollow%20Ranch%22%2C%20%22short_name%22%3A%20%22Cedar%20Hollow%22%2C%20%22start_url%22%3A%20%22./%22%2C%20%22scope%22%3A%20%22./%22%2C%20%22display%22%3A%20%22standalone%22%2C%20%22background_color%22%3A%20%22%23EADFCE%22%2C%20%22theme_color%22%3A%20%22%237A5341%22%2C%20%22orientation%22%3A%20%22portrait%22%2C%20%22icons%22%3A%20%5B%7B%22src%22%3A%20%22icon-192.png%22%2C%20%22sizes%22%3A%20%22192x192%22%2C%20%22type%22%3A%20%22image/png%22%2C%20%22purpose%22%3A%20%22any%22%7D%2C%20%7B%22src%22%3A%20%22icon-512.png%22%2C%20%22sizes%22%3A%20%22512x512%22%2C%20%22type%22%3A%20%22image/png%22%2C%20%22purpose%22%3A%20%22any%22%7D%5D%7D" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EADFCE; --surface:#FBF6EE; --surface-2:#F3E9DA;
    --ink:#2E2620; --muted:#8A7869; --line:#E2D4C0;
    --pine:#7A5341; --pine-deep:#5E3F30; --bark:#3A2A20;
    --leather:#B07A70; --leather-deep:#90584F;
    --brass:#C7A267; --brass-lt:#E2C892;
    --rose-soft:#F2DAD3;
    --good:#5E8A5A; --warn:#B07A2A; --bad:#A8492F;
    --shadow:0 1px 2px rgba(46,38,32,.06), 0 8px 24px rgba(46,38,32,.09);
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overscroll-behavior:none}
  body{
    font-family:Inter,system-ui,sans-serif;
    color:var(--ink);
    position:fixed;inset:0;overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% -10%, #f6e7df 0%, var(--bg) 55%) fixed,
      repeating-linear-gradient(90deg, rgba(120,84,64,.035) 0 2px, transparent 2px 46px) fixed;
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .display{font-family:"Bricolage Grotesque",system-ui,sans-serif;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  img{max-width:100%;display:block}
  input,textarea{font-family:inherit;font-size:16px}
  :focus-visible{outline:2.5px solid var(--brass);outline-offset:2px;border-radius:6px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ---- phone shell ---- */
  .shell{
    max-width:448px;margin:0 auto;height:100dvh;
    background:var(--surface);
    box-shadow:0 0 0 1px var(--line), 0 30px 80px rgba(30,25,18,.18);
    position:relative;overflow:hidden;display:flex;flex-direction:column;
  }
  @media(min-width:480px){ .shell{margin:24px auto;height:calc(100dvh - 48px);border-radius:28px} }

  /* ---- top bar ---- */
  .topbar{
    background:var(--bark);color:#EDE6D6;padding:12px 14px;
    display:flex;align-items:center;gap:10px;position:relative;z-index:30;flex:none;
    border-bottom:1px solid rgba(182,138,62,.35);
  }
  .brand{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;flex:1;min-width:0}
  .brand .mark{
    width:36px;height:36px;border-radius:10px;flex:none;overflow:hidden;
    background:#FBF6EE;
    display:grid;place-items:center;color:var(--bark);
    box-shadow:inset 0 1px 1px rgba(255,255,255,.5), 0 1px 3px rgba(0,0,0,.3);
  }
  .brand .mark img{width:100%;height:100%;object-fit:cover}
  .brand-txt{min-width:0}
  .brand b{font-family:"Bricolage Grotesque";font-weight:700;font-size:15px;letter-spacing:.01em;line-height:1.08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  .brand small{display:block;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-lt);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar-right{display:flex;align-items:center;gap:8px;flex:none}
  .status-pill{
    display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;
    padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12);white-space:nowrap;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:#7e8c80;flex:none}
  .dot.on{background:#7BD389;box-shadow:0 0 0 3px rgba(123,211,137,.25);animation:pulse 2s infinite}
  @keyframes pulse{50%{box-shadow:0 0 0 6px rgba(123,211,137,0)}}
  .ava{width:32px;height:32px;border-radius:9px;object-fit:cover;border:1.5px solid var(--brass);background:var(--pine)}
  .icon-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:#EDE6D6;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);position:relative;flex:none}
  .icon-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8}
  .nbadge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:var(--bad);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;border:2px solid var(--bark);box-sizing:border-box}
  .prof-btn{padding:0;border-radius:9px;flex:none;line-height:0}

  /* ---- scroll body ---- */
  .body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;overscroll-behavior:contain;touch-action:pan-y}
  .view{padding:18px 16px 8px;animation:rise .35s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .eyebrow{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--leather);font-weight:600;margin:0 0 4px}
  h1.title{font-family:"Bricolage Grotesque";font-weight:700;font-size:25px;margin:0 0 2px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .section-label{display:flex;align-items:center;gap:10px;margin:22px 2px 12px}
  .section-label h2{font-family:"Bricolage Grotesque";font-weight:600;font-size:15px;margin:0}
  .section-label .ln{flex:1;height:1px;background:var(--line)}

  /* ---- nameplate (signature motif) ---- */
  .plate{
    --pl:#C9A75A;
    display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;
    background:linear-gradient(170deg,#d8bd7e,#b78f43 60%,#a07b35);
    color:#2a2113;box-shadow:inset 0 1px 1px rgba(255,255,255,.55), inset 0 -2px 4px rgba(80,55,10,.35), var(--shadow);
    border:1px solid #8a6c2e;position:relative;
  }
  .plate::before{content:"";position:absolute;left:6px;top:6px;width:5px;height:5px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff7df,#7a5d22);box-shadow:0 0 0 1px rgba(0,0,0,.15)}
  .plate::after{content:"";position:absolute;right:6px;top:6px;width:5px;height:5px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff7df,#7a5d22);box-shadow:0 0 0 1px rgba(0,0,0,.15)}
  .plate .pname{font-family:"Bricolage Grotesque";font-weight:700;font-size:15px;letter-spacing:.02em;line-height:1.1}
  .plate .pmeta{font-size:11px;opacity:.8;line-height:1.1;margin-top:1px}
  .plate .photo{width:38px;height:38px;border-radius:7px;object-fit:cover;border:1px solid #8a6c2e;flex:none;background:#2e2a22}

  /* ---- buttons ---- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:12px 16px;border-radius:12px;font-weight:600;font-size:14px;
    background:var(--pine);color:#F4EFE2;box-shadow:var(--shadow);transition:transform .08s, filter .15s;
    width:100%;
  }
  .btn:active{transform:translateY(1px)}
  .btn:hover{filter:brightness(1.06)}
  .btn.leather{background:var(--leather)}
  .btn.ghost{background:transparent;color:var(--pine);border:1.5px solid var(--line);box-shadow:none}
  .btn.brass{background:linear-gradient(160deg,var(--brass-lt),var(--brass));color:#2a2113}
  .btn.sm{padding:8px 12px;font-size:13px;width:auto}
  .btn.danger{background:var(--bad)}
  .btn[disabled]{opacity:.5;pointer-events:none}

  /* ---- check-in ---- */
  .checkin-card{padding:18px;text-align:center;margin-bottom:8px;background:linear-gradient(165deg,#efe4cd,#e6d9bc)}
  .big-toggle{
    width:92px;height:92px;border-radius:50%;margin:4px auto 8px;display:grid;place-items:center;
    background:radial-gradient(circle at 50% 32%, #d35346, #b23529);color:#fff;
    border:2px solid #9c2f25;box-shadow:0 0 0 6px rgba(178,53,41,.13), var(--shadow);transition:.25s;
  }
  .big-toggle .ic{font-size:24px;line-height:1}
  .big-toggle .lbl{font-size:10px;font-weight:700;letter-spacing:.05em;margin-top:3px}
  .big-toggle.on{
    background:radial-gradient(circle at 50% 35%,#946a53,var(--pine));color:#f6ece6;border:2px solid var(--brass);
    box-shadow:0 0 0 6px rgba(51,80,63,.12), var(--shadow);
  }
  .board{display:flex;flex-direction:column;gap:9px}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:18px;border:1px dashed var(--line);border-radius:12px;background:var(--surface-2)}

  /* ---- feed ---- */
  .post{padding:13px 14px;margin-bottom:10px}
  .post .head{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .post .head img{width:32px;height:32px;border-radius:9px;object-fit:cover;background:var(--pine)}
  .post .who{font-weight:600;font-size:13.5px}
  .post .when{font-size:11px;color:var(--muted)}
  .post .txt{font-size:14px;color:#352f27}
  .post .tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    color:var(--leather);background:#f2e6df;padding:2px 7px;border-radius:6px;margin-left:auto}
  .post .acts{display:flex;gap:16px;margin-top:9px;font-size:12px;color:var(--muted);font-weight:600}
  .post .acts button{display:flex;align-items:center;gap:5px;color:var(--muted)}
  .post .acts button.liked{color:var(--leather)}
  .composer{display:flex;gap:8px;align-items:flex-end;margin-bottom:14px}
  .composer textarea{flex:1;border:1px solid var(--line);border-radius:12px;padding:10px 12px;resize:none;
    background:var(--surface);min-height:44px;max-height:120px;font-size:14px;color:var(--ink)}

  /* ---- hire ---- */
  .pro{display:flex;gap:12px;padding:13px;margin-bottom:10px;align-items:center}
  .pro .av{width:46px;height:46px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:22px;
    background:var(--surface-2);border:1px solid var(--line)}
  .pro .nm{font-weight:600;font-size:14px}
  .pro .role{font-size:11.5px;color:var(--leather);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .pro .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .stars{color:var(--brass);font-size:12px;letter-spacing:1px}

  /* ---- shop ---- */
  .shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .prod{padding:0;overflow:hidden;display:flex;flex-direction:column}
  .prod .pic{aspect-ratio:1;background:var(--surface-2);display:grid;place-items:center;border-bottom:1px solid var(--line)}
  .prod .pic svg{width:74%;height:74%}
  .prod .info{padding:9px 10px 11px}
  .prod .pn{font-weight:600;font-size:13px;line-height:1.25}
  .prod .pp{font-family:"Bricolage Grotesque";font-weight:700;font-size:15px;margin-top:2px}
  .prod .add{margin-top:8px;width:100%;padding:7px;font-size:12.5px}
  .brandtag{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--brass);font-weight:600}

  /* ---- rides ---- */
  .ride{padding:14px;margin-bottom:11px;position:relative;overflow:hidden}
  .ride .date{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .ride .cal{width:46px;height:50px;border-radius:10px;background:var(--pine);color:#fff;display:grid;
    place-items:center;text-align:center;flex:none;line-height:1}
  .ride .cal .m{font-size:9px;letter-spacing:.12em;text-transform:uppercase;opacity:.85}
  .ride .cal .d{font-family:"Bricolage Grotesque";font-weight:700;font-size:20px}
  .ride .rn{font-family:"Bricolage Grotesque";font-weight:600;font-size:15px}
  .ride .rmeta{font-size:12px;color:var(--muted);margin-top:1px}
  .chip{display:inline-block;font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:999px;
    background:var(--surface-2);border:1px solid var(--line);color:var(--muted)}
  .chip.easy{color:#2f6b43;background:#e6f0e6;border-color:#cadfca}
  .chip.mod{color:#9a6b1f;background:#f4ecd9;border-color:#e6d6ad}
  .chip.adv{color:#9a3a26;background:#f4e0da;border-color:#e6c4ba}
  .spots{font-size:12px;font-weight:600;margin:9px 0 10px}
  .spots b{color:var(--leather)}

  /* ---- bottom nav ---- */
  .tabs{
    flex:none;width:100%;
    background:rgba(251,248,241,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);
    display:flex;z-index:40;padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  }
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;color:var(--muted);font-size:9.5px;font-weight:600;letter-spacing:.02em}
  .tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7}
  .tab.active{color:var(--pine)}
  .tab.active .ix{background:rgba(122,83,65,.12)}
  .tab .ix{padding:4px 12px;border-radius:999px;transition:.2s}

  /* ---- onboarding ---- */
  .onboard{padding:0;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
  .hero{
    background:linear-gradient(180deg,var(--bark),var(--pine-deep));color:#EDE6D6;
    padding:46px 26px 30px;position:relative;overflow:hidden;
  }
  .hero::after{content:"";position:absolute;inset:0;opacity:.12;
    background:repeating-linear-gradient(115deg,#fff 0 1px,transparent 1px 9px)}
  .hero .mk{width:54px;height:54px;border-radius:15px;background:linear-gradient(160deg,var(--brass-lt),var(--brass));
    display:grid;place-items:center;color:var(--bark);margin-bottom:18px;box-shadow:inset 0 1px 1px rgba(255,255,255,.5)}
  .hero h1{font-family:"Bricolage Grotesque";font-weight:700;font-size:33px;line-height:1.04;margin:0 0 8px;letter-spacing:-.02em;position:relative}
  .hero p{font-size:14.5px;color:#cfc6b2;margin:0;max-width:30ch;position:relative}
  .ob-body{padding:24px 22px 30px;flex:1}
  .photo-drop{
    aspect-ratio:1;border-radius:20px;border:2px dashed var(--line);background:var(--surface-2);
    display:grid;place-items:center;text-align:center;color:var(--muted);overflow:hidden;position:relative;margin-bottom:18px;
  }
  .photo-drop img{width:100%;height:100%;object-fit:cover}
  .photo-drop .ph{display:flex;flex-direction:column;align-items:center;gap:7px;padding:20px}
  .photo-drop .ph .ic{font-size:34px}
  .photo-drop .frame{position:absolute;inset:10px;border:2px solid rgba(182,138,62,.55);border-radius:14px;pointer-events:none}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--ink)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

  /* ---- modal / toast ---- */
  .scrim{position:fixed;inset:0;background:rgba(30,25,18,.5);z-index:60;display:grid;place-items:center;padding:24px;animation:fade .2s}
  @keyframes fade{from{opacity:0}}
  .modal{background:var(--surface);border-radius:20px;padding:22px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:rise .25s}
  .modal h3{font-family:"Bricolage Grotesque";font-weight:700;font-size:19px;margin:0 0 4px}
  .modal p{font-size:13px;color:var(--muted);margin:0 0 16px}
  .modal input{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:12px;background:var(--surface-2)}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:80;
    background:var(--bark);color:#EDE6D6;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:500;
    box-shadow:0 10px 30px rgba(0,0,0,.3);border:1px solid rgba(182,138,62,.4);animation:toastin .3s;max-width:90%}
  @keyframes toastin{from{opacity:0;transform:translate(-50%,12px)}}

  /* ---- owner mode ---- */
  .owner-banner{background:linear-gradient(120deg,var(--leather),var(--leather-deep));color:#fbeee7;
    padding:11px 16px;display:flex;align-items:center;gap:10px;font-size:12.5px;font-weight:600}
  .owner-banner .x{margin-left:auto}
  .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
  .stat{padding:12px 10px;text-align:center}
  .stat .n{font-family:"Bricolage Grotesque";font-weight:700;font-size:22px;color:var(--pine)}
  .stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
  .horse-card{padding:13px;margin-bottom:12px}
  .horse-card .top{display:flex;align-items:center;gap:11px;margin-bottom:10px}
  .horse-card .stall{font-size:11px;color:var(--muted)}
  .horse-card .bal{margin-left:auto;text-align:right}
  .horse-card .bal .amt{font-family:"Bricolage Grotesque";font-weight:700;font-size:15px}
  .horse-card .bal.due .amt{color:var(--bad)}
  .horse-card .bal.paid .amt{color:var(--good)}
  .med{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:11px;background:var(--surface-2);margin-bottom:7px;border:1px solid var(--line)}
  .med .mn{font-weight:600;font-size:13px}
  .med .md{font-size:11.5px;color:var(--muted)}
  .med .toggle{margin-left:auto;flex:none}
  .switch{width:46px;height:27px;border-radius:999px;background:#cfc6b2;position:relative;transition:.2s;flex:none}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .switch.on{background:var(--good)}
  .switch.on::after{left:22px}
  .note{font-size:12px;color:#4a443a;background:#f6f0e2;border-left:3px solid var(--brass);padding:7px 10px;border-radius:0 8px 8px 0;margin-top:8px}
  .mini-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:10px 0 5px}

  .foot{padding:20px 16px 30px;text-align:center;color:var(--muted);font-size:11px}
  .foot b{cursor:default;color:var(--muted)}
  .cart-fab{position:absolute;right:16px;bottom:84px;z-index:45;width:50px;height:50px;border-radius:16px;
    background:var(--leather);color:#fff;display:grid;place-items:center;box-shadow:var(--shadow)}
  .cart-fab .badge{position:absolute;top:-5px;right:-5px;background:var(--brass);color:#2a2113;font-size:11px;font-weight:700;

  .leopard::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,244,246,.28),rgba(247,221,226,.12));pointer-events:none;z-index:0}
  .op-sheet{position:relative;z-index:1;background:rgba(252,247,248,.95);margin:13px;border-radius:18px;border:1px solid #eab6c2;box-shadow:0 10px 30px rgba(150,70,90,.28)}
  .op-sheet .view{animation:none}
  .optabs{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:4px;margin-bottom:16px;position:sticky;top:8px;z-index:5}
  .optab{flex:1;padding:9px 4px;border-radius:10px;font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}
  .optab.on{background:var(--pine);color:#F4EFE2;box-shadow:var(--shadow)}
  .rsort{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:3px;margin-bottom:12px}
  .rsort button{flex:1;padding:7px 4px;border-radius:8px;font-size:11.5px;font-weight:600;color:var(--muted);white-space:nowrap}
  .rsort button.on{background:var(--leather);color:#fff}
  .seg{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:3px;margin-bottom:10px}
  .segbtn{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted)}
  .segbtn.on{background:var(--pine);color:#F4EFE2}
  .stallgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:4px}
  .stallcell{border:1px solid var(--line);border-radius:10px;padding:9px 4px;text-align:center;background:var(--surface)}
  .stallcell .sn{font-family:'Bricolage Grotesque';font-weight:700;font-size:15px}
  .stallcell .so{font-size:9.5px;color:var(--muted);margin-top:1px;line-height:1.15}
  .stallcell.mine{background:var(--pine);color:#F4EFE2;border-color:var(--pine)}
  .stallcell.mine .so{color:#e7dcc7}
  .stallcell.taken{opacity:.45}
  .stallcell[disabled]{pointer-events:none}
  .pastrow{display:flex;align-items:center;justify-content:space-between;width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-top:7px;background:var(--surface);font-size:13.5px;font-weight:600;text-align:left}
  .pastrow .cnt{font-size:12px;color:var(--muted);font-weight:600}
  .pastrow.mine{background:var(--pine);color:#F4EFE2;border-color:var(--pine)}
  .pastrow.mine .cnt{color:#e7dcc7}
  .pastrow[disabled]{opacity:.5;pointer-events:none}
  .todTime{width:96px;border:1px solid var(--line);border-radius:8px;padding:6px 7px;background:var(--surface-2);font-size:12px;color:var(--ink);font-family:inherit;flex:none}
  .todCheck{width:32px;height:32px;border-radius:9px;border:2px solid var(--line);background:var(--surface);color:#fff;font-weight:800;font-size:15px;flex:none;display:grid;place-items:center}
  .todCheck.on{background:var(--good);border-color:var(--good)}
  .medrow.done{opacity:.6}
  .medrow.done .mn2{text-decoration:line-through}
  .medfield{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);color:var(--ink);margin-bottom:8px;font-size:16px}
  .daysel{display:flex;gap:5px}
  .dayChip{flex:1;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);color:var(--muted);font-size:12px;font-weight:700}
  .dayChip.on{background:var(--leather);border-color:var(--leather);color:#fff}
  /* colored horse badge */
  .hbox{display:inline-grid;place-items:center;border-radius:6px;flex:none;color:#fff;vertical-align:middle;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
  /* profile editor */
  .back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--pine);margin-bottom:10px}
  .hcard{display:flex;flex-direction:column;gap:9px;padding:12px;margin-bottom:11px}
  .hrow{display:flex;align-items:center;gap:9px}
  .hrow input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:var(--surface);color:var(--ink)}
  .xbtn{width:30px;height:30px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);color:var(--bad);font-weight:700;flex:none}
  .swatches{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .swatch{width:50px;height:50px;border-radius:12px;border:2px solid var(--line);background:var(--surface-2);padding:2px;display:grid;place-items:center}
  .swatch img{width:100%;height:100%;object-fit:contain;display:block}
  .swatch.sel{border-color:var(--pine);box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--pine)}
  /* replies */
  .reply-list{margin-top:9px;padding-left:11px;border-left:2px solid var(--line);display:flex;flex-direction:column;gap:9px}
  .reply{display:flex;gap:8px;align-items:flex-start}
  .reply .rtxt{font-size:13px;color:#352f27;margin-top:1px}
  .reply .rwho{font-weight:600;font-size:12.5px}
  .reply .rwhen{font-size:10.5px;color:var(--muted)}
  .reply-box{display:flex;gap:7px;align-items:center;margin-top:10px}
  .reply-box input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:var(--surface-2);font-size:16px;color:var(--ink)}
  #boardTrigger{touch-action:none;-webkit-touch-callout:none}
  .logo{background:#FBF6EE!important;overflow:hidden}
  .logo img{width:100%;height:100%;object-fit:contain;display:block}
  .logo .fallback{width:100%;height:100%;place-items:center;color:var(--pine)}
  .mk.logo{padding:0}
  .hero .mk img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
  .mark.logo{padding:2px}
  .hidden{display:none!important}
</style>

function initials(n){ return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }
function avatar(photo,color,name,size=32){
  const bg = COATS[color] ? COATS[color].hex : ((color&&color[0]==="#")?color:"#C8A06A");

function shade(hex,pct){
  let c=(hex||"buckskin").replace("#",""); if(c.length===3)c=c.split("").map(x=>x+x).join("");
  let r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  const f=pct<0?0:255,p=Math.abs(pct);
  r=Math.round((f-r)*p)+r; g=Math.round((f-g)*p)+g; b=Math.round((f-b)*p)+b;
  return "#"+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,"0")).join("");
}
let _hg=0;
function horse3D(coat,size=28){

/* ---------- live weather (Open-Meteo, no key, ranch coords) ---------- */
let weatherCache=null;
function describeWx(code){
  const m={0:["Clear","☀️"],1:["Mainly clear","🌤️"],2:["Partly cloudy","⛅"],3:["Overcast","☁️"],
    45:["Fog","🌫️"],48:["Fog","🌫️"],51:["Light drizzle","🌦️"],53:["Drizzle","🌦️"],55:["Drizzle","🌦️"],
    61:["Light rain","🌧️"],63:["Rain","🌧️"],65:["Heavy rain","🌧️"],66:["Freezing rain","🌧️"],67:["Freezing rain","🌧️"],
    71:["Light snow","🌨️"],73:["Snow","🌨️"],75:["Heavy snow","❄️"],77:["Snow grains","🌨️"],
    80:["Showers","🌦️"],81:["Showers","🌦️"],82:["Heavy showers","⛈️"],85:["Snow showers","🌨️"],86:["Snow showers","🌨️"],
    95:["Thunderstorm","⛈️"],96:["Thunderstorm","⛈️"],99:["Thunderstorm","⛈️"]};
  return m[code]||["—","🌤️"];
}
function applyWx(d){
  const t=$("#wxTemp"),i=$("#wxIcon"),de=$("#wxDesc"); if(!t)return;
  const [desc,emo]=describeWx(d.code);
  t.textContent=`${Math.round(d.temp)}°F · ${desc}`;
  i.textContent=emo;
  de.textContent=`Juniper Flats, CO · wind ${Math.round(d.wind)} mph`;
}
function loadWeather(){
  if(weatherCache && Date.now()-weatherCache.t<1800000){ applyWx(weatherCache); return; }
  fetch("https://api.open-meteo.com/v1/forecast?latitude=32.4&longitude=-111.12&current=temperature_2m,wind_speed_10m,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FPhoenix")
    .then(r=>r.json())
    .then(j=>{ const c=j.current; weatherCache={temp:c.temperature_2m,wind:c.wind_speed_10m,code:c.weather_code,t:Date.now()}; applyWx(weatherCache); })
    .catch(()=>{ const t=$("#wxTemp"),de=$("#wxDesc"); if(t){t.textContent="Weather unavailable";if(de)de.textContent="Juniper Flats, CO";} });
}

  const map={barn:viewBarn,feed:viewFeed,hire:viewHire,shop:viewShop,rides:viewRides,profile:viewProfile,notifs:viewNotifs,ride:viewRide};
  b.innerHTML=map[S.view]();
  ({barn:bindBarn,feed:bindFeed,hire:bindHire,shop:bindShop,rides:bindRides,profile:bindProfile,notifs:bindNotifs,ride:bindRide}[S.view])();
}

/* ---------- BARN / check-in ---------- */
function viewBarn(){
  const ph=pHorse();
  const onBoard = S.checkedIn ? [{first:firstName(dispName()), name:dispName(), full:S.user.name, contact:S.user.contact||"", horse:ph.name, since:0, color:ph.color, me:true, showHorse:!!S.user.showHorse},...S.board] : S.board;
  return `<div class="view">
    <p class="eyebrow" id="boardTrigger" style="user-select:none;-webkit-user-select:none;cursor:default">The board</p>
    <h1 class="title">At the ranch</h1>
    <p class="sub">Tap your nameplate up when you arrive so owners and friends know you're on the property.</p>

    <div class="card checkin-card">
      <button class="big-toggle ${S.checkedIn?'on':''}" id="ci">
        <div><div class="ic">${S.checkedIn?'🐴':'📍'}</div><div class="lbl">${S.checkedIn?"YOU'RE HERE":"CHECK IN"}</div></div>
      </button>
      <p style="font-size:13px;color:var(--muted);margin:4px 0 0">${S.checkedIn?`Hang tight, ${dispName().split(" ")[0]} — you're checked in with ${ph.name}.`:"Press when you reach the property."}</p>
    </div>

    <div class="section-label"><h2>On the property now</h2><span class="ln"></span><span style="font-size:12px;color:var(--muted);font-weight:600">${onBoard.length}</span></div>
    <div class="board">
      ${onBoard.length? onBoard.map(p=>`
        <div class="plate" ${p.me?'style="box-shadow:inset 0 1px 1px rgba(255,255,255,.55), 0 0 0 2px var(--pine), var(--shadow)"':''}>
          ${horse3D(p.color,42)}
          <div style="flex:1"><div class="pname">${boardLabel(p)}${p.me?' · you':''}</div><div class="pmeta">on the property · ${p.since===0?'just now':p.since+'m ago'}</div></div>
        </div>`).join("")
      : `<div class="empty">Nobody's checked in yet. Be the first! 🤠</div>`}
    </div>

    <div class="section-label"><h2>Weather at the ranch</h2><span class="ln"></span></div>
    <div class="card" style="padding:14px" id="wxCard">
      <div style="display:flex;gap:11px;align-items:center">
        <span style="font-size:26px" id="wxIcon">🌤️</span>
        <div><b style="font-size:15px" id="wxTemp">Checking the sky…</b><div style="font-size:12px;color:var(--muted)" id="wxDesc">Juniper Flats, CO</div></div>
      </div>
    </div>

    <div class="section-label"><h2>Jordan's announcements</h2><span class="ln"></span></div>
    <div id="annList">
      ${S.announcements.map(a=>announcementCard(a)).join("")}
    </div>
  </div>`;
}
function bindBarn(){
  loadWeather();
  const trig=$("#boardTrigger");
  if(trig){
    let t=null;
    const start=(e)=>{ try{ trig.setPointerCapture(e.pointerId); }catch(_){} clearTimeout(t); t=setTimeout(()=>askOwner(),2000); };
    const stop=()=>{ clearTimeout(t); t=null; };
    trig.addEventListener("pointerdown",start);
    trig.addEventListener("pointerup",stop);
    trig.addEventListener("pointercancel",stop);
    trig.addEventListener("contextmenu",e=>e.preventDefault());
  }
  const btn=$("#ci"); if(!btn)return;
  btn.onclick=()=>{
    S.checkedIn=!S.checkedIn;
    toast(S.checkedIn?"Checked in — your nameplate's up 🐴":"Checked out. Ride safe!");
    renderApp();
  };
}

function viewFeed(){

    ${S.feed.map(p=>`

        <div class="head">
          ${avatar(isMe(p.who)?S.user.photo:null,p.color,p.who,32)}
          <div style="flex:1"><div class="who">${p.who} ${horseBox(p.color,18)} <span style="color:var(--muted);font-weight:400">· ${p.horse}</span></div><div class="when">${p.when}</div></div>
          <span class="tag">${p.tag}</span>
        </div>

        </div>
        ${(p.replies&&p.replies.length)?`<div class="reply-list">${p.replies.map(r=>`
          <div class="reply">${avatar(isMe(r.who)?S.user.photo:null,r.color,r.who,26)}
            <div><span class="rwho">${r.who}</span> ${horseBox(r.color,15)} <span class="rwhen">· ${r.when}</span><div class="rtxt">${escapeHtml(r.txt)}</div></div>
          </div>`).join("")}</div>`:""}
        ${S.replyOpen===p.id?`<div class="reply-box"><input id="replyInput" placeholder="Write a reply…" autocomplete="off" autocapitalize="sentences" enterkeyhint="send"><button class="btn brass sm replySend" data-pid="${p.id}" style="padding:9px 13px">Send</button></div>`:""}
      </div>`).join("")}
  </div>`;
}
function bindFeed(){
  $("#postBtn").onclick=()=>{
    const v=$("#postBox").value.trim(); if(!v)return;
    S.feed.unshift({id:Date.now(),who:userLabel(),horse:pHorse().name,tag:"horses",txt:v,when:"now",color:pHorse().color,likes:0,liked:false,replies:[]});
    save(); renderView(); toast("Posted to the feed");
    setTimeout(()=>addNotif("like", randomPerson(), "liked your post"), 4500);
  };
  shell.querySelectorAll(".likeBtn").forEach(b=>b.onclick=()=>{
    const p=S.feed.find(x=>x.id==b.dataset.pid);
    p.liked=!p.liked; p.likes+=p.liked?1:-1; save(); renderView();
  });
  shell.querySelectorAll(".replyBtn").forEach(b=>b.onclick=()=>{
    const id=Number(b.dataset.pid); S.replyOpen = S.replyOpen===id?null:id; renderView();
    const ri=$("#replyInput"); if(ri)ri.focus();
  });
  shell.querySelectorAll(".replySend").forEach(b=>b.onclick=()=>{
    const id=Number(b.dataset.pid), v=$("#replyInput").value.trim(); if(!v)return;
    const p=S.feed.find(x=>x.id===id); if(!p.replies)p.replies=[];
    p.replies.push({who:userLabel(),color:pHorse().color,txt:v,when:"now"});
    S.replyOpen=null; save(); renderView(); toast("Reply added");
    setTimeout(()=>addNotif("commentlike", randomPerson(), "liked your comment"), 5000);
  });
}

function bindRides(){

function chatBubble(m){
  return `<div class="card" style="padding:10px 12px;margin-bottom:8px;display:flex;gap:9px;align-items:flex-start">
    ${avatar(isMe(m.who)?S.user.photo:null,m.color,m.who,30)}
    <div style="flex:1"><div style="font-size:12.5px"><b>${m.who}</b> <span style="color:var(--muted);font-size:11px">· ${m.when}</span></div>
    <div style="font-size:13.5px;color:#352f27;margin-top:1px">${escapeHtml(m.txt)}</div></div>
  </div>`;
}
function viewRide(){
  const r=RIDES.find(x=>x.id===S.rideOpen);
  if(!r){ S.view="rides"; return viewRides(); }
  const joined=S.joined[r.id]; const taken=r.taken+(joined?1:0); const left=r.cap-taken;
  const dl={easy:'easy',mod:'moderate',adv:'advanced'}[r.diff];
  const msgs=S.rideChats[r.id]||[];
  return `<div class="view">
    <button class="back-btn" id="rdBack">‹ All rides</button>
    <div class="card" style="padding:14px;margin-bottom:14px">
      <div class="date">
        <div class="cal"><div class="m">${r.m}</div><div class="d">${r.d}</div></div>
        <div style="flex:1"><div class="rn">${r.nm}</div><div class="rmeta">${r.time} · ${r.guide}</div></div>
        <span class="chip ${r.diff}">${dl}</span>
      </div>
      <div class="spots" style="margin:9px 0 10px">${left>0?`<b>${left} spot${left>1?'s':''}</b> left of ${r.cap}`:`<b>Full</b> — join the waitlist`}</div>
      <button class="btn ${joined?'ghost':''}" id="rdJoin">${joined?"✓ Signed up! — cancel":(left>0?'Reserve my spot':'Join waitlist')}</button>
    </div>

    <div class="section-label"><h2>Ride chat</h2><span class="ln"></span></div>
    <p class="sub" style="margin-top:-4px">Ask the group anything about this ride — meeting spot, pace, what to bring.</p>
    <div id="rideMsgs">
      ${msgs.length? msgs.map(m=>chatBubble(m)).join("") : `<div class="empty">No messages yet. Say hi 👋</div>`}
    </div>
    <div class="reply-box" style="margin-top:12px"><input id="rideInput" placeholder="Message the group…" autocomplete="off" autocapitalize="sentences" enterkeyhint="send"><button class="btn brass sm" id="rideSend" style="padding:10px 14px">Send</button></div>
    <div style="height:14px"></div>
  </div>`;
}
function bindRide(){
  const back=$("#rdBack"); if(back)back.onclick=()=>{ S.view="rides"; renderApp(); };
  const j=$("#rdJoin"); if(j)j.onclick=()=>{
    const r=RIDES.find(x=>x.id===S.rideOpen); S.joined[r.id]=!S.joined[r.id];
    toast(S.joined[r.id]?"Signed up! 🐎":"Reservation cancelled"); renderView();
  };
  const send=()=>{
    const inp=$("#rideInput"), v=(inp&&inp.value.trim())||""; if(!v)return;
    if(!S.rideChats[S.rideOpen])S.rideChats[S.rideOpen]=[];
    S.rideChats[S.rideOpen].push({who:userLabel(),color:pHorse().color,txt:v,when:"now"});
    save(); renderView();
    const bd=$("#body"); if(bd) requestAnimationFrame(()=>{ bd.scrollTop=bd.scrollHeight; });
  };
  const sb=$("#rideSend"); if(sb)sb.onclick=send;
  const inp=$("#rideInput"); if(inp)inp.onkeydown=e=>{ if(e.key==="Enter")send(); };
}

      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1"><div style="font-weight:600;font-size:13.5px">Show my horse's name, not mine</div>

      <div class="card hcard">

        </div>
        <div>
          <div style="font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em">Coat color</div>
          <div class="swatches">${COAT_KEYS.map(c=>`<button class="swatch ${c===(h.color||"")?'sel':''}" data-i="${i}" data-c="${c}" title="${COATS[c].label}" aria-label="${COATS[c].label} coat"><img src="${COATS[c].img}" alt=""></button>`).join("")}</div>

function bindProfile(){
  $("#pfBack").onclick=()=>{ S.view="barn"; renderApp(); };
  const pb=$("#pfPhotoBtn"), pi=$("#pfPhoto");
  if(pb)pb.onclick=()=>pi.click();
  if(pi)pi.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
    r.onload=ev=>{ syncProfileInputs(); S.prof.photo=ev.target.result; renderView(); }; r.readAsDataURL(f); };
  shell.querySelectorAll(".swatch").forEach(sw=>sw.onclick=()=>{ syncProfileInputs(); S.prof.horses[+sw.dataset.i].color=sw.dataset.c; renderView(); });
  shell.querySelectorAll(".rmHorse").forEach(b=>b.onclick=()=>{ syncProfileInputs(); S.prof.horses.splice(+b.dataset.i,1); renderView(); });
  const ah=$("#addHorse"); if(ah)ah.onclick=()=>{ syncProfileInputs(); S.prof.horses.push({name:"",color:"redroan"}); renderView(); };
  const ps=$("#privSwitch"); if(ps)ps.onclick=()=>{ syncProfileInputs(); S.prof.showHorse=!S.prof.showHorse; renderView(); };
  $("#pfSave").onclick=()=>{
    syncProfileInputs();
    const horses=S.prof.horses.map(h=>({id:h.id,name:(h.name||"").trim(),color:h.color})).filter(h=>h.name);
    if(!horses.length){ toast("Add at least one horse"); return; }
    S.user.nick=(S.prof.nick||"").trim()||S.user.name;
    S.user.photo=S.prof.photo;
    S.user.showHorse=!!S.prof.showHorse;
    S.user.horses=horses;
    S.user.horse=horses[0].name;
    S.user.color=horses[0].color;
    syncRoster();
    save(); S.view="barn"; renderApp(); toast("Profile saved 🐴");
  };
}

/* =====================  OWNER MODE  ===================== */
function askOwner(){
  const scrim=document.createElement("div"); scrim.className="scrim"; scrim.id="scrim";
  scrim.innerHTML=`<div class="modal">
    <h3>Operator access</h3>
    <p>Private — Jordan & staff only. Enter your 4-digit PIN.</p>
    <input id="pw" type="password" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off" style="letter-spacing:.6em;text-align:center;font-size:22px">
    <div style="display:flex;gap:9px">
      <button class="btn ghost" id="pwCancel" style="flex:1">Cancel</button>
      <button class="btn leather" id="pwGo" style="flex:1">Unlock</button>
    </div>
  </div>`;
  document.body.appendChild(scrim);
  $("#pw").focus();
  const close=()=>scrim.remove();
  scrim.onclick=e=>{if(e.target===scrim)close();};

function fmtTime(t){ if(!t)return ""; const p=t.split(":"); let H=+p[0]; const M=p[1]; const ap=H<12?"AM":"PM"; let h=H%12; if(h===0)h=12; return h+":"+M+" "+ap; }
function timeToMin(t){ if(!t)return 0; const p=t.split(":"); return (+p[0])*60+(+p[1]); }
function todayLabel(){ try{ return new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }catch(e){ return "Today"; } }
const DOW_SHORT=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DOW_LETTER=["S","M","T","W","T","F","S"];
function todayDow(){ return new Date().getDay(); }
function todayKey(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function medDays(m){ return Array.isArray(m.days)?m.days:[0,1,2,3,4,5,6]; }
function medToday(m){ return medDays(m).indexOf(todayDow())>=0; }
function daysLabel(days){
  const d=Array.isArray(days)?days:[0,1,2,3,4,5,6];
  if(d.length===7) return "Daily";
  if(d.length===0) return "Not scheduled";
  const k=[...d].sort((a,b)=>a-b).join(",");
  if(k==="1,2,3,4,5") return "Weekdays";
  if(k==="0,6") return "Weekends";
  return [...d].sort((a,b)=>a-b).map(i=>DOW_SHORT[i]).join(", ");
}
function dayChips(days){
  const d=Array.isArray(days)?days:[0,1,2,3,4,5,6];
  return `<div class="daysel">${DOW_LETTER.map((L,i)=>`<button type="button" class="dayChip ${d.indexOf(i)>=0?'on':''}" data-d="${i}">${L}</button>`).join("")}</div>`;
}
function ensureMedDay(){
  const t=todayKey();
  if(S.medDay!==t){
    S.medDay=t;
    if(Array.isArray(S.horses)) S.horses.forEach(h=>h.meds&&h.meds.forEach(m=>{ m.given=false; }));
    save();
  }
}
function confirmModal(title,msg,yesLabel,onYes){
  const scrim=document.createElement("div"); scrim.className="scrim";
  scrim.innerHTML=`<div class="modal"><h3>${title}</h3><p>${msg}</p>
    <div style="display:flex;gap:9px"><button class="btn ghost" id="cmNo" style="flex:1">Cancel</button>
    <button class="btn leather" id="cmYes" style="flex:1">${yesLabel||"Confirm"}</button></div></div>`;
  document.body.appendChild(scrim);
  const close=()=>scrim.remove();
  scrim.onclick=e=>{ if(e.target===scrim)close(); };
  $("#cmNo").onclick=close;
  $("#cmYes").onclick=()=>{ close(); onYes(); };
}

           </div>`
        : `<button class="btn ghost sm" id="medAdd" style="width:100%;margin-top:4px">+ Add medication</button>`}
      ${h.meds.length?'':`<div style="font-size:12px;color:var(--muted);padding:6px 2px 0">No medications yet.</div>`}
      <div class="note" style="margin-top:9px">🥣 ${escapeHtml(h.feed)}</div>
      <div class="foot"><b>Cedar Hollow Ranch · Office build v0.1</b></div>
    </div>
   </div>
  </div>`;
  $("#exitOwner").onclick=()=>{S.owner=false;S.ownerHorse=null;render();};
  $("#hdBack").onclick=()=>{S.ownerHorse=null;S.opTab="horses";renderOwner();};

  const firstOpenStall=()=>STALLS.find(s=>S.horses.findIndex(x=>x.location==='stall'&&x.stall===s)<0);
  const firstOpenPasture=()=>PASTURES.find(p=>S.horses.filter(x=>x.location==='pasture'&&x.pasture===p).length<PASTURE_CAP);

  const cs=$("#catStall"); if(cs)cs.onclick=()=>{
    if(h.location==='stall')return;
    if(h.location!=='pasture'){ S.placeTab='stall'; renderHorseDetail(hi); return; }
    const open=firstOpenStall();
    if(!open){ toast("All 9 stalls are full"); return; }
    confirmModal(`Bring ${h.name} into a stall?`,`This moves ${h.name} from ${h.pasture} into ${open}. You can pick a different stall after.`,"Move to stall",
      ()=>{ h.location="stall"; h.stall=open; save(); renderHorseDetail(hi); toast(`${h.name} is now in ${open} 🏠`); });
  };
  const cp=$("#catPasture"); if(cp)cp.onclick=()=>{
    if(h.location==='pasture')return;
    if(h.location!=='stall'){ S.placeTab='pasture'; renderHorseDetail(hi); return; }
    const open=firstOpenPasture();
    if(!open){ toast("All pastures are full"); return; }
    confirmModal(`Turn ${h.name} out to pasture?`,`This moves ${h.name} from ${h.stall} out to ${open}. You can pick a different pasture after.`,"Move to pasture",
      ()=>{ h.location="pasture"; h.pasture=open; save(); renderHorseDetail(hi); toast(`${h.name} is now in ${open} 🌿`); });
  };
  shell.querySelectorAll(".stallcell").forEach(c=>c.onclick=()=>{
    const s=c.dataset.stall; if(h.location==='stall'&&s===h.stall)return;
    const wasNew=h.location!=='stall';
    h.location="stall"; h.stall=s; S.placeTab=null; save(); renderHorseDetail(hi);
    toast(wasNew?`${h.name} placed in ${s} 🏠`:`${h.name} moved to ${s}`);
  });
  shell.querySelectorAll(".pastrow").forEach(c=>c.onclick=()=>{
    const p=c.dataset.pasture; if(h.location==='pasture'&&p===h.pasture)return;
    const wasNew=h.location!=='pasture';
    h.location="pasture"; h.pasture=p; S.placeTab=null; save(); renderHorseDetail(hi);
    toast(wasNew?`${h.name} placed in ${p} 🌿`:`${h.name} moved to ${p}`);
  });
  const ma=$("#medAdd"); if(ma)ma.onclick=()=>{ S.medEdit={hi,mi:-1}; renderHorseDetail(hi); };
  shell.querySelectorAll(".medEditBtn").forEach(b=>b.onclick=()=>{ S.medEdit={hi,mi:+b.dataset.mi}; renderHorseDetail(hi); });
  shell.querySelectorAll(".medCancel").forEach(b=>b.onclick=()=>{ S.medEdit=null; renderHorseDetail(hi); });
  shell.querySelectorAll(".dayChip").forEach(c=>c.onclick=()=>c.classList.toggle("on"));
  shell.querySelectorAll(".medSave").forEach(b=>b.onclick=()=>{
    const card=b.closest(".card");
    const n=card.querySelector(".medN").value.trim();
    const dose=card.querySelector(".medD").value.trim();
    const time=card.querySelector(".medT").value||"07:00";
    let days=[...card.querySelectorAll(".dayChip.on")].map(x=>+x.dataset.d);
    if(!days.length) days=[0,1,2,3,4,5,6];
    if(!n){ toast("Give the medication a name"); return; }
    const mi=+b.dataset.mi;
    if(mi===-1) h.meds.push({n,dose,time,given:false,days});
    else { h.meds[mi].n=n; h.meds[mi].dose=dose; h.meds[mi].time=time; h.meds[mi].days=days; }
    S.medEdit=null; save(); renderHorseDetail(hi); toast(mi===-1?`${n} added`:`${n} updated`);
  });
  shell.querySelectorAll(".medDel").forEach(b=>b.onclick=()=>{
    const mi=+b.dataset.mi, nm=h.meds[mi].n;
    confirmModal(`Delete ${nm}?`,`This removes ${nm} from ${h.name}'s medications.`,"Delete",
      ()=>{ h.meds.splice(mi,1); S.medEdit=null; save(); renderHorseDetail(hi); toast(`${nm} deleted`); });
  });
  shell.querySelectorAll(".med .toggle").forEach(sw=>sw.onclick=()=>{
    const m=h.meds[sw.dataset.m]; m.given=!m.given; save(); renderHorseDetail(hi);
    toast(m.given?`${m.n} marked given`:`${m.n} un-marked`);
  });
}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* boot */
ensureMedDay();
syncRoster(); save();
render();
</script>
</body>
</html>
